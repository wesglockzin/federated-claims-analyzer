# TEMPLATE - DO NOT COMMIT WITH REAL VALUES
# Copy this file to secrets.yaml and fill in the base64-encoded values
# To base64 encode a value: echo -n 'your-secret' | base64
#
# IMPORTANT: Add secrets.yaml to .gitignore to prevent accidental commits

apiVersion: v1
kind: Secret
metadata:
  name: federated-claims-analyzer-secrets
  labels:
    app: federated-claims-analyzer
type: Opaque
data:
  # Required secrets (base64 encoded)
  FLASK_SECRET_KEY: ""           # Generate with: python -c "import secrets; print(secrets.token_hex(32))"

  # Azure AD OIDC (for app login)
  AZURE_OIDC_CLIENT_ID: ""       # From Azure AD App Registration
  AZURE_OIDC_CLIENT_SECRET: ""   # From Azure AD App Registration
  AZURE_OIDC_TENANT_ID: ""       # Your Azure AD Tenant ID

  # Okta OIDC secrets (for testing Okta SSO)
  OKTA_DEV_OIDC_SECRET: ""
  OKTA_PROD_OIDC_SECRET: ""      # Optional

  # Okta API tokens (for token lifetime checks)
  OKTA_DEV_API_TOKEN: ""         # Optional
  OKTA_PROD_API_TOKEN: ""        # Optional

  # ADFS client secrets (for testing ADFS SSO)
  ADFS_DEV_CLIENT_SECRET: ""
  ADFS_PROD_CLIENT_SECRET: ""

  # SAML certificates (for SP-initiated SAML)
  # Use the full certificate/key content, base64 encoded
  SAML_TESTER_CERT: ""
  SAML_TESTER_KEY: ""

---
# Alternative: Create secrets via kubectl command
# kubectl create secret generic federated-claims-analyzer-secrets \
#   --from-literal=FLASK_SECRET_KEY='your-flask-secret' \
#   --from-literal=AZURE_OIDC_CLIENT_ID='your-client-id' \
#   --from-literal=AZURE_OIDC_CLIENT_SECRET='[REDACTED]' \
#   --from-literal=AZURE_OIDC_TENANT_ID='your-tenant-id' \
#   --from-literal=OKTA_DEV_OIDC_SECRET='[REDACTED]' \
#   --from-literal=ADFS_DEV_CLIENT_SECRET='[REDACTED]' \
#   --from-literal=ADFS_PROD_CLIENT_SECRET='[REDACTED]' \
#   --from-file=SAML_TESTER_CERT=./saml_tester.cert \
#   --from-file=SAML_TESTER_KEY=./saml_tester.key
