apiVersion: apps/v1
kind: Deployment
metadata:
  name: federated-claims-analyzer
  labels:
    app: federated-claims-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: federated-claims-analyzer
  template:
    metadata:
      labels:
        app: federated-claims-analyzer
    spec:
      containers:
      - name: federated-claims-analyzer
        image: ${ACR_NAME}.azurecr.io/federated-claims-analyzer:latest
        ports:
        - containerPort: 8080
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        # Non-sensitive configuration
        - name: APP_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: federated-claims-analyzer-config
              key: APP_BASE_URL
        # Sensitive secrets from Kubernetes Secrets
        - name: FLASK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: FLASK_SECRET_KEY
        - name: AZURE_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: AZURE_OIDC_CLIENT_ID
        - name: AZURE_OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: AZURE_OIDC_CLIENT_SECRET
        - name: AZURE_OIDC_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: AZURE_OIDC_TENANT_ID
        - name: OKTA_DEV_OIDC_SECRET
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: OKTA_DEV_OIDC_SECRET
        - name: OKTA_PROD_OIDC_SECRET
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: OKTA_PROD_OIDC_SECRET
              optional: true
        - name: OKTA_DEV_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: OKTA_DEV_API_TOKEN
              optional: true
        - name: OKTA_PROD_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: OKTA_PROD_API_TOKEN
              optional: true
        - name: ADFS_DEV_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: ADFS_DEV_CLIENT_SECRET
        - name: ADFS_PROD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: ADFS_PROD_CLIENT_SECRET
        - name: SAML_TESTER_CERT
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: SAML_TESTER_CERT
        - name: SAML_TESTER_KEY
          valueFrom:
            secretKeyRef:
              name: federated-claims-analyzer-secrets
              key: SAML_TESTER_KEY
        livenessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /login
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # Needs /tmp for SAML certs
          capabilities:
            drop:
              - ALL
      securityContext:
        fsGroup: 1000
